########################################################################################################
#  Scenario 3 — ConfigMap + Secrets Injection
# Very useful for apps needing dynamic config.
# Concepts Practiced:
# envFrom
# config file mounting
# Secrets
# Pod environment injection
########################################################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_COLOR: "blue"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  PASSWORD: cGFzczEyMw==   # base64
---
apiVersion: v1
kind: Pod
metadata:
  name: config-demo
spec:
  containers:
  - name: app
    image: nginx
    envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: app-secret
## Working vesion of Yaml file for resource limits and requests for a pod running httpd container.
apiVersion: v1
kind: Pod
metadata:
  name: httpd-pod
spec:
  containers:
   - name: httpd-container
     image: httpd:latest
     resources:
       requests:
         memory: "15Mi"
         cpu: "100m"
       limits:
         memory: "20Mi"
         cpu: "100m"
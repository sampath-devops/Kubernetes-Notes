# First version of Yaml file for resource limits
apiVersion: v1
kind: pod
metadata:
  name: httpd-pod
spec:
  containers:
   - name: httpd-container
     image: httpd:latest
     resources:
       requests:
         memory: "15Mi"
         CPU: "100m"
       limits:
         memory: "20Mi"
         CPU: "100m"


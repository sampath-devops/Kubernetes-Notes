apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-datacenter
spec:
  storageClassName: manual
  capacity:
    storage: 3Gi
  accessModes: 
    - ReadWriteOnce
  hostPath:
    path: /mnt/devops

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-datacenter
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources: 
    requests:
      storage: 3Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-datacenter
  labels:
    name: pod-datacenter
spec:
      volumes: 
        - name: volume-persistent
          persistentVolumeClaim:
            claimName: pvc-datacenter
      containers:
        - name: container-datacenter
          image: httpd:latest
          volumeMounts:
            - name: volume-persistent
              mountPath: /var/www/html/
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: web-datacenter
spec:
  type: NodePort
  selector:
    name: pod-datacenter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30008
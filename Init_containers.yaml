apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-deploy-xfusion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ic-xfusion
  template:
    metadata:
      labels:
        app: ic-xfusion
    spec:
      initContainers:
        - name: ic-msg-xfusion
          image: debian:latest
          command: ["/bin/bash", "-c", "echo Init Done - Welcome to xFusionCorp Industries > /ic/media"]
          volumeMounts:
            - mountPath: /ic
              name: ic-volume-xfusion
      containers:
        - name: ic-main-xfusion
          image: debian:latest
          command: ["/bin/bash", "-c", "while true; do cat /ic/media; sleep 5; done"]
          volumeMounts:
            - mountPath: /ic
              name: ic-volume-xfusion
      volumes:
        - name: ic-volume-xfusion
          emptyDir: {}

          